<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION // DevOps Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(10, 15, 20, 0.85);
            --neon-blue: #00f3ff;
            --neon-green: #00ff66;
            --neon-red: #ff003c;
            --neon-purple: #b026ff;
            --text-main: #c7d0d9;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            font-family: 'Fira Code', monospace;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            grid-template-rows: 80px 1fr 200px;
            gap: 15px;
            padding: 15px;
        }

        /* --- Global Styles --- */
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 4px;
            box-shadow: var(--border-glow);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(5px);
        }
        
        .panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 30px;
            border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue);
        }
        .panel::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 30px; height: 30px;
            border-bottom: 2px solid var(--neon-blue); border-right: 2px solid var(--neon-blue);
        }

        .header-title { font-size: 0.8rem; color: var(--neon-blue); margin-bottom: 10px; border-bottom: 1px solid rgba(0, 243, 255, 0.2); padding-bottom: 5px; }
        .highlight { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        .danger { color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red); }

        /* --- Header --- */
        .header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-blue); padding: 0 20px; background: rgba(0,0,0,0.5); }
        .logo { font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); }
        .sys-status { display: flex; gap: 20px; font-size: 0.9rem; }
        .status-badge { padding: 5px 10px; border: 1px solid var(--neon-green); color: var(--neon-green); box-shadow: 0 0 5px var(--neon-green); animation: pulse 2s infinite; }

        @keyframes pulse { 0% { box-shadow: 0 0 5px var(--neon-green); } 50% { box-shadow: 0 0 15px var(--neon-green); } 100% { box-shadow: 0 0 5px var(--neon-green); } }

        /* --- Left: Server Logs (The Illusion) --- */
        .terminal { grid-column: 1 / 2; grid-row: 2 / 4; overflow-y: hidden; position: relative; }
        .log-container { height: 100%; overflow-y: auto; font-size: 0.75rem; color: #55ff55; display: flex; flex-direction: column; gap: 4px; padding-right: 5px; }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: var(--neon-green); }
        .log-line { opacity: 0.8; animation: slideIn 0.2s ease-out; }
        .log-time { color: #888; margin-right: 8px; }
        @keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- Center: The "Core" & Real Tasks --- */
        .center-stage { grid-column: 2 / 3; grid-row: 2 / 3; display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        
        /* The Hologram / Radar */
        .radar-container { position: relative; width: 250px; height: 250px; border-radius: 50%; border: 1px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); margin-top: 20px; }
        .radar-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: repeating-radial-gradient(transparent, transparent 20px, rgba(0, 243, 255, 0.1) 21px, rgba(0, 243, 255, 0.1) 22px); }
        .radar-sweep { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-blue)); transform-origin: 0 0; animation: sweep 4s linear infinite; box-shadow: 0 0 15px var(--neon-blue); }
        @keyframes sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Real Tasks UI */
        .tasks-module { width: 100%; margin-top: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .task-input-wrapper { display: flex; gap: 10px; margin-bottom: 15px; }
        .cli-input { flex-grow: 1; background: rgba(0, 243, 255, 0.05); border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px 15px; font-family: 'Fira Code'; font-size: 1rem; outline: none; transition: all 0.3s; }
        .cli-input:focus { background: rgba(0, 243, 255, 0.15); box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
        .btn-exec { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); font-family: 'Orbitron'; cursor: pointer; padding: 0 20px; font-weight: bold; transition: all 0.2s; text-transform: uppercase; }
        .btn-exec:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        
        .task-list { list-style: none; overflow-y: auto; flex-grow: 1; max-height: 250px; }
        .task-item { background: rgba(0,0,0,0.6); border-left: 3px solid var(--neon-purple); margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.3s ease; border: 1px solid rgba(176, 38, 255, 0.2); }
        .btn-kill { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); padding: 4px 10px; cursor: pointer; font-size: 0.8rem; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-kill:hover { background: var(--neon-red); color: #000; box-shadow: 0 0 10px var(--neon-red); }

        /* --- Right: Live Charts (Fake + Real) --- */
        .metrics-panel { grid-column: 3 / 4; grid-row: 2 / 4; display: flex; flex-direction: column; gap: 15px; }
        .chart-box { height: 180px; width: 100%; position: relative; }
        .stat-overlay { position: absolute; top: 10px; right: 10px; font-size: 1.2rem; font-family: 'Orbitron'; font-weight: bold; }

        /* --- Bottom: System Info --- */
        .sys-info { grid-column: 2 / 3; grid-row: 3 / 4; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .info-box { background: rgba(0, 243, 255, 0.02); border: 1px solid rgba(0, 243, 255, 0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; }
        .info-val { font-size: 1.5rem; font-family: 'Orbitron'; color: var(--neon-blue); margin-top: 5px; text-shadow: 0 0 8px var(--neon-blue); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">ORION <span style="font-size: 1rem; font-weight:300; letter-spacing: 5px;">NEXUS</span></div>
        <div class="sys-status">
            <div class="status-badge" id="global-status">CLUSTER HEALTH: OPTIMAL</div>
            <div class="status-badge" style="border-color: var(--neon-blue); color: var(--neon-blue); animation: none;" id="commit-hash">v1.0.0-XXXXXXX</div>
        </div>
    </header>

    <div class="panel terminal">
        <h3 class="header-title">>> NODE_CLUSTER_LOGS // LIVE</h3>
        <div class="log-container" id="terminal-logs">
            </div>
    </div>

    <div class="panel center-stage">
        <div style="text-align: center;">
            <h3 class="header-title" style="border: none;">GLOBAL TRAFFIC ROUTING</h3>
            <div class="radar-container">
                <div class="radar-grid"></div>
                <div class="radar-sweep"></div>
                <div style="position:absolute; top:30%; left:40%; width:4px; height:4px; background:#fff; border-radius:50%; box-shadow: 0 0 10px #fff; animation: pulse 1s infinite;"></div>
                <div style="position:absolute; top:60%; left:70%; width:4px; height:4px; background:var(--neon-red); border-radius:50%; box-shadow: 0 0 10px var(--neon-red); animation: pulse 1.5s infinite;"></div>
            </div>
        </div>

        <div class="tasks-module">
            <h3 class="header-title">>> ACTIVE_DIRECTIVES (DB_SYNC)</h3>
            <form class="task-input-wrapper" id="task-form">
                <span style="color:var(--neon-blue); font-size: 1.5rem; line-height: 40px;">></span>
                <input type="text" id="task-input" class="cli-input" placeholder="Enter command payload..." required autocomplete="off">
                <button type="submit" class="btn-exec">DEPLOY</button>
            </form>
            <ul class="task-list" id="task-list">
                </ul>
        </div>
    </div>

    <div class="panel metrics-panel">
        <h3 class="header-title">>> RESOURCE_TELEMETRY</h3>
        
        <div class="chart-box">
            <div class="stat-overlay highlight" id="cpu-text">42%</div>
            <canvas id="cpuChart"></canvas>
        </div>
        
        <div class="chart-box">
            <div class="stat-overlay" style="color: var(--neon-purple);" id="net-text">1.2 GB/s</div>
            <canvas id="netChart"></canvas>
        </div>

        <div class="chart-box">
            <div class="stat-overlay" style="color: var(--neon-green);" id="mem-text">256 MB</div>
            <canvas id="memChart"></canvas>
        </div>
    </div>

    <div class="panel sys-info">
        <div class="info-box">
            <div style="color: var(--text-main); font-size: 0.8rem;">SERVER UPTIME</div>
            <div class="info-val" id="real-uptime">00:00:00</div>
        </div>
        <div class="info-box">
            <div style="color: var(--text-main); font-size: 0.8rem;">DB TRANSACTIONS</div>
            <div class="info-val" id="real-db-count">0</div>
        </div>
        <div class="info-box">
            <div style="color: var(--text-main); font-size: 0.8rem;">PLATFORM ENV</div>
            <div class="info-val" id="real-platform">Linux</div>
        </div>
    </div>

    <script>
        /* =========================================
           1. LA ILUSIÓN: GRÁFICOS Y LOGS FALSOS
           ========================================= */
        
        // Configurador genérico de gráficos para Chart.js
        const chartOptions = {
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 0 }, // Sin animación para que parezca fluido frame a frame
            scales: {
                x: { display: false },
                y: { display: false, min: 0, max: 100 }
            },
            plugins: { legend: { display: false }, tooltip: { enabled: false } },
            elements: { point: { radius: 0 }, line: { tension: 0.4, borderWidth: 2 } }
        };

        function createChart(ctxId, color, gradientOpacity) {
            const ctx = document.getElementById(ctxId).getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'transparent');

            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{ data: Array(20).fill(50), borderColor: color, backgroundColor: gradient, fill: true }]
                },
                options: chartOptions
            });
        }

        const cpuChart = createChart('cpuChart', '#00f3ff');
        const netChart = createChart('netChart', '#b026ff');
        const memChart = createChart('memChart', '#00ff66');

        // Actualizador de datos falsos (alta frecuencia para impresionar)
        setInterval(() => {
            // CPU Aleatoria (30% - 80%)
            const cpuVal = Math.floor(Math.random() * 50) + 30;
            cpuChart.data.datasets[0].data.shift();
            cpuChart.data.datasets[0].data.push(cpuVal);
            cpuChart.update();
            document.getElementById('cpu-text').innerText = `${cpuVal}%`;

            // Red Aleatoria
            const netVal = (Math.random() * 5 + 0.5).toFixed(1);
            netChart.data.datasets[0].data.shift();
            netChart.data.datasets[0].data.push(netVal * 10);
            netChart.update();
            document.getElementById('net-text').innerText = `${netVal} GB/s`;

        }, 1000);

        // Generador de Logs de Terminal Falsos
        const terminal = document.getElementById('terminal-logs');
        const fakeLogMessages = [
            "Authenticating secure channel to Worker Node #42...",
            "BGP routing tables updated successfully.",
            "WARNING: Spiky traffic detected in eu-west-2.",
            "Scaling up Kubernetes Pods (Replicas: 8 -> 12)...",
            "Garbage collection executed (Freed: 1.2GB).",
            "SSL Handshake completed with external client.",
            "Syncing distributed SQLite instances...",
            "Docker image layer extracted.",
            "Render deployment webhook triggered."
        ];

        function addLog(message, isReal = false) {
            const time = new Date().toISOString().substring(11, 19);
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">[${time}]</span> <span style="color: ${isReal ? '#00f3ff' : '#55ff55'}">${message}</span>`;
            terminal.appendChild(line);
            if (terminal.children.length > 50) terminal.removeChild(terminal.firstChild);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Lanza logs falsos aleatoriamente
        setInterval(() => {
            if(Math.random() > 0.4) {
                const msg = fakeLogMessages[Math.floor(Math.random() * fakeLogMessages.length)];
                addLog(msg);
            }
        }, 1200);


        /* =========================================
           2. LA REALIDAD: INTEGRACIÓN CON TU API (SQLite & Node)
           ========================================= */

        const DOM = {
            taskList: document.getElementById('task-list'),
            form: document.getElementById('task-form'),
            input: document.getElementById('task-input'),
            uptime: document.getElementById('real-uptime'),
            platform: document.getElementById('real-platform'),
            commit: document.getElementById('commit-hash'),
            dbCount: document.getElementById('real-db-count')
        };

        let taskCount = 0;

        // Cargar Tareas
        async function fetchTasks() {
            try {
                addLog("Fetching directives from SQLite Memory DB...", true);
                const res = await fetch('/api/tasks');
                const tasks = await res.json();
                taskCount = tasks.length;
                DOM.dbCount.innerText = taskCount;
                
                DOM.taskList.innerHTML = tasks.map(t => `
                    <li class="task-item">
                        <span style="color: var(--text-main); font-family: monospace;">[ID:00${t.id}] ${t.title}</span>
                        <button class="btn-kill" onclick="deleteTask(${t.id})">SIGKILL</button>
                    </li>
                `).join('');
            } catch (e) {
                addLog("ERROR: SQLite Connection Failed", true);
            }
        }

        // Crear Tarea
        async function addTask(e) {
            e.preventDefault();
            const title = DOM.input.value;
            addLog(`Executing INSERT directive: Payload [${title}]`, true);
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title })
            });
            DOM.input.value = '';
            fetchTasks();
        }

        // Eliminar Tarea
        async function deleteTask(id) {
            addLog(`Executing DELETE directive: Target [ID:${id}]`, true);
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
            fetchTasks();
        }

        // Cargar Métricas y Versión
        async function fetchSystemData() {
            try {
                const resVer = await fetch('/api/version');
                const dataVer = await resVer.json();
                DOM.commit.innerText = dataVer.version;

                const resMet = await fetch('/metrics');
                const dataMet = await resMet.json();
                
                const hrs = String(Math.floor(dataMet.uptime / 3600)).padStart(2, '0');
                const mins = String(Math.floor((dataMet.uptime % 3600) / 60)).padStart(2, '0');
                const secs = String(Math.floor(dataMet.uptime % 60)).padStart(2, '0');
                DOM.uptime.innerText = `${hrs}:${mins}:${secs}`;
                DOM.platform.innerText = dataMet.platform.toUpperCase();

                // Actualiza el gráfico de memoria real
                const mb = (dataMet.memoryUsage.rss / 1024 / 1024).toFixed(1);
                document.getElementById('mem-text').innerText = `${mb} MB`;
                memChart.data.datasets[0].data.shift();
                memChart.data.datasets[0].data.push(mb);
                memChart.update();

            } catch (error) {
                document.getElementById('global-status').innerText = "CLUSTER HEALTH: CRITICAL";
                document.getElementById('global-status').style.borderColor = "red";
                document.getElementById('global-status').style.color = "red";
            }
        }

        // Inicialización
        DOM.form.addEventListener('submit', addTask);
        fetchTasks();
        fetchSystemData();
        setInterval(fetchSystemData, 3000); // Polling real a tu API cada 3s

    </script>
</body>
</html>
